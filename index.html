<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App - Professional</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="auth-screen" class="screen active">
        <div class="auth-box">
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
                <button class="tab-btn" onclick="switchAuthTab('register')">Register</button>
            </div>
            
            <form id="login-form" class="auth-form active">
                <h3>Welcome Back</h3>
                <input type="email" id="login-email" placeholder="Your Email ID" required>
                <input type="password" id="login-password" placeholder="Enter Password" required>
                <button type="submit" class="btn-primary" id="login-submit-btn">Login</button>
                <p id="login-msg" class="success-msg hidden"></p>
            </form>

            <form id="register-form" class="auth-form">
                <h3>Create Account</h3>
                <input type="text" id="reg-username" placeholder="Username" required>
                <input type="email" id="reg-email" placeholder="Your Email ID" required>
                <input type="password" id="reg-password" placeholder="Create Password" required>
                <button type="submit" class="btn-primary" id="reg-submit-btn">Register & Send Link</button>
                <p id="reg-msg" class="success-msg hidden">Verification link sent!</p>
            </form>

            <div id="verify-loader" class="hidden">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Verifying your account...
            </div>
        </div>
    </div>

    <div id="app-screen" class="screen hidden">
        <div class="gchat-container" id="main-container">
            
            <div class="gchat-sidebar">
                <div class="sidebar-header">
                    <div class="user-profile" id="my-profile-name">
                        <i class="fa-solid fa-user-check" style="color:var(--g-blue)"></i> User
                    </div>
                    <i class="fa-solid fa-right-from-bracket logout-btn" onclick="logoutUser()" title="Logout"></i>
                </div>
                <div style="padding: 0 10px 10px;">
                    <button class="new-chat-btn" onclick="openInviteModal()" style="width:100%"><i class="fa-solid fa-plus"></i> Invite User</button>
                </div>
                
                <div class="sidebar-menu">
                    <div class="menu-item active" onclick="showUsersList()"><i class="fa-solid fa-users"></i> All Users</div>
                    <div class="menu-item request-badge" onclick="showRequests()"><i class="fa-solid fa-user-plus"></i> Invites <span class="badge">0</span></div>
                </div>

                <div class="direct-messages">
                    <p class="section-title"><i class="fa-solid fa-caret-down"></i> Active Users</p>
                    <div class="chat-list" id="chat-list-container">
                        <p style="padding:10px; color:#9aa0a6; font-size:13px;">Loading users...</p>
                    </div>
                </div>
            </div>

            <div class="gchat-main">
                <div id="empty-state" class="empty-state">
                    <img src="https://www.gstatic.com/dynamite/images/zero_state_2x.png" alt="Empty" style="width: 250px; opacity: 0.8; border-radius: 10px;">
                    <p>Select a user to start chatting.</p>
                </div>

                <div id="chat-area" class="chat-area hidden">
                    <header class="chat-header">
                        <div class="chat-title">
                            <i class="fa-solid fa-arrow-left back-btn" onclick="closeChatMobile()"></i>
                            <span id="active-chat-name">Select a chat</span>
                            <span class="status-indicator"></span>
                        </div>
                    </header>
                    <div class="chat-messages" id="chat-messages">
                        </div>
                    <div class="chat-input-box">
                        <i class="fa-solid fa-plus"></i>
                        <textarea id="message-input" rows="1" placeholder="Type a message..."></textarea>
                        <i class="fa-solid fa-paper-plane send-btn-icon" id="send-icon" onclick="sendMessage()" style="color:var(--g-blue)"></i>
                    </div>
                </div>

                <div id="requests-area" class="requests-area hidden">
                    <header class="chat-header">
                        <div class="chat-title">
                            <i class="fa-solid fa-arrow-left back-btn" onclick="closeChatMobile()"></i>
                            <span>Pending Invites</span>
                        </div>
                    </header>
                    <div id="requests-list" style="padding: 20px;">
                        <p style="color: #9aa0a6; font-size: 14px;">No new requests.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="invite-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Invite a friend</h3>
            <p>Enter email ID to send a chat request link</p>
            <input type="email" id="invite-email" placeholder="friend@example.com">
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeInviteModal()">Cancel</button>
                <button class="btn-primary" onclick="sendInvite()">Send Invite</button>
            </div>
            <p id="invite-msg" class="success-msg hidden"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
